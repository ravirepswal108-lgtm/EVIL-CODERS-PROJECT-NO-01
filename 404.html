<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      text-align: center;
      padding: 24px;
    }
    h1 {
      font-size: 52px;
      margin: 0 0 8px;
    }
    p {
      margin: 0;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <main>
    <h1>404</h1>
    <p>The page you are looking for does not exist.</p>
  </main>
</body>
</html>
